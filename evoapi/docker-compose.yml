services:
  evolution-api:
    container_name: evolution-api

    image: evoapicloud/evolution-api:latest

    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - .env

    volumes:
      - evolution_instances:/evolution/instances

    networks:
      - automacoes

volumes:
  evolution_instances:

networks:
  automacoes:
    external: true